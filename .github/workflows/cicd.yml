# This is a workflow that will be displayed in the actions tab
name: CICD 
# Manual click deliver whenever need
on:
  workflow_dispatch: 
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from GitHub"
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build docker container
        run: echo "Docker container build"
  test:
    runs-on: ubuntu-latest
    steps:
      - name: test the container
        run: echo "testing the container"
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the app
        run: echo "Docker compose deploy the app"
  
